name: linux

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libx11-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev libwayland-dev \
            libxkbcommon-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp build/raylib-game dist/
          cp -r build/assets dist/assets

      - uses: actions/upload-artifact@v7
        with:
          name: raylib-game-linux
          path: dist/
