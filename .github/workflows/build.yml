name: build

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

jobs:
  desktop:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact: raylib-game-windows
          - os: ubuntu-latest
            name: Linux
            artifact: raylib-game-linux
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libx11-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev libwayland-dev \
            libxkbcommon-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item build/Release/raylib-game.exe dist/
          Copy-Item build/Release/assets dist/assets -Recurse

      - name: Stage artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp build/raylib-game dist/
          cp -r build/assets dist/assets

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v15
        with:
          version: 5.0.3
          actions-cache-folder: emsdk-cache

      - name: Configure
        run: emcmake cmake -B build-web -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-web

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp build-web/raylib-game.html dist/index.html
          cp build-web/raylib-game.js dist/
          cp build-web/raylib-game.wasm dist/
          cp build-web/raylib-game.data dist/

      - uses: actions/upload-artifact@v7
        with:
          name: raylib-game-web
          path: dist/

  deploy-pages:
    name: Deploy Web to GitHub Pages
    needs: web
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: raylib-game-web
          path: dist

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
